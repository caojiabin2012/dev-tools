name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          TAG="v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          find_msi() {
            find artifacts/windows-installer -name "*.msi" -type f 2>/dev/null | head -1
          }
          find_appimage() {
            find artifacts/linux-installer -name "*.AppImage" -type f 2>/dev/null | head -1
          }
          find_mac_tar() {
            find artifacts/macos-installer -name "*.tar.gz" -type f 2>/dev/null | head -1
          }
          # GitHub Release 会把产物名里的空格变成点（Dev Tools -> Dev.Tools）
          release_filename() {
            basename "$1" | tr ' ' '.'
          }

          WIN_MSI=$(find_msi)
          LINUX_APPIMAGE=$(find_appimage)
          MAC_TAR=$(find_mac_tar)

          win_url=""; linux_url=""; mac_url=""
          if [ -n "$WIN_MSI" ]; then
            win_url="${BASE_URL}/$(release_filename "$WIN_MSI")"
          fi
          if [ -n "$LINUX_APPIMAGE" ]; then
            linux_url="${BASE_URL}/$(release_filename "$LINUX_APPIMAGE")"
          fi
          if [ -n "$MAC_TAR" ]; then
            mac_url="${BASE_URL}/$(release_filename "$MAC_TAR")"
          fi

          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"${VERSION}\","
            echo "  \"notes\": \"See https://github.com/${REPO}/releases/tag/${TAG} for details.\","
            echo "  \"pub_date\": \"${PUB_DATE}\","
            echo '  "platforms": {'
            first=1
            if [ -n "$win_url" ]; then
              echo "    \"windows-x86_64\": {\"signature\": \"\", \"url\": \"${win_url}\"}"
              first=0
            fi
            if [ -n "$linux_url" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"\", \"url\": \"${linux_url}\"}"
              first=0
            fi
            if [ -n "$mac_url" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"darwin-aarch64\": {\"signature\": \"\", \"url\": \"${mac_url}\"}"
              echo ','
              echo "    \"darwin-x86_64\": {\"signature\": \"\", \"url\": \"${mac_url}\"}"
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"

          mv "$tmp_json" latest.json
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/v${{ steps.version.outputs.VERSION }}.md
          files: |
            artifacts/windows-installer/**/*.msi
            artifacts/windows-installer/**/*.exe
            artifacts/linux-installer/**/*.deb
            artifacts/linux-installer/**/*.AppImage
            artifacts/macos-installer/**/*.dmg
            artifacts/macos-installer/**/*.tar.gz
            latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
