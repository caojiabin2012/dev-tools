name: Sync to Gitee

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_KEY }}

      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:caojiabin/tool-kit.git
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git push gitee master
