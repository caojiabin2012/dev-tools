# Gitee 流水线配置 - 跨平台构建
# 文档: https://gitee.com/help/articles/4311

stages:
  - build
  - release

variables:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ==================== Windows 构建 ====================
build-windows:
  stage: build
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  tags:
    - windows
  script:
    - choco install nodejs --version=%NODE_VERSION% -y
    - choco install rust -y
    - refreshenv
    - npm install -g pnpm@%PNPM_VERSION%
    - pnpm install
    - pnpm tauri build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/msi/
      - src-tauri/target/release/bundle/nsis/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ==================== Linux 构建 ====================
build-linux:
  stage: build
  image: ubuntu:22.04
  tags:
    - linux
  before_script:
    - apt-get update && apt-get install -y
        curl wget gnupg2 ca-certificates lsb-release
        libgtk-3-dev libwebkit2gtk-4.1-dev
        libappindicator3-dev librsvg2-dev patchelf
        libxdo-dev libssl-dev
    - curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash -
    - apt-get install -y nodejs
    - npm install -g pnpm@${PNPM_VERSION}
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
  script:
    - pnpm install
    - pnpm tauri build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/deb/
      - src-tauri/target/release/bundle/appimage/
      - src-tauri/target/release/bundle/rpm/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ==================== macOS Intel 构建 ====================
build-macos-intel:
  stage: build
  image: macos-12
  tags:
    - macos
  variables:
    TAURI_ENV_PLATFORM: "darwin"
  script:
    - brew install node@${NODE_VERSION}
    - brew install pnpm
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - pnpm install
    - pnpm tauri build --target x86_64-apple-darwin
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/
      - src-tauri/target/release/bundle/macos/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ==================== macOS ARM 构建 ====================
build-macos-arm:
  stage: build
  image: macos-14
  tags:
    - macos
  variables:
    TAURI_ENV_PLATFORM: "darwin"
  script:
    - brew install node@${NODE_VERSION}
    - brew install pnpm
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - pnpm install
    - pnpm tauri build --target aarch64-apple-darwin
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/
      - src-tauri/target/release/bundle/macos/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ==================== 创建 Release ====================
create-release:
  stage: release
  image: ubuntu:22.04
  tags:
    - linux
  dependencies:
    - build-windows
    - build-linux
    - build-macos-intel
    - build-macos-arm
  before_script:
    - apt-get update && apt-get install -y curl jq
  script:
    - |
      # 获取 tag 名称
      TAG_NAME=${CI_COMMIT_TAG}
      echo "Creating release for tag: $TAG_NAME"
      
      # 收集所有构建产物
      find artifacts/ -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" \) -exec ls -lh {} \;
      
      echo "Release artifacts ready!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
